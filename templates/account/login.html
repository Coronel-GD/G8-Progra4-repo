{% extends "base.html" %}
{% load socialaccount %}
{% load static %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-3">Iniciar sesión</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100" type="submit">Ingresar</button>
    </form>
    <hr>
    <a href="{% provider_login_url 'google' %}" class="btn btn-danger w-100 mb-2">
        Iniciar con Google
    </a>
    <a href="{% provider_login_url 'github' %}" class="btn btn-dark w-100">
        Iniciar con GitHub
    </a>
    <p class="mt-3">
        ¿No tenés cuenta?
        <a href="{% url 'account_signup' %}">Registrate aquí</a>.
    </p>
</div>
{% endblock %}
