{% extends "base.html" %}
{% load socialaccount %}
{% load static %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-3">Crear cuenta</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success w-100" type="submit">Registrarme</button>
    </form>
    <hr>
    <a href="{% provider_login_url 'google' %}" class="btn btn-danger w-100 mb-2">
        Registrarme con Google
    </a>
    <a href="{% provider_login_url 'github' %}" class="btn btn-dark w-100">
        Registrarme con GitHub
    </a>
    <p class="mt-3">
        ¿Ya tenés cuenta?
        <a href="{% url 'account_login' %}">Iniciar sesión</a>.
    </p>
</div>
{% endblock %}
